name: CI/CD — Build & Deploy

# Runs on every push to main (and can be triggered manually from the Actions tab).
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# Never let two deploys run at once; a newer push waits for the current deploy to finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── CI: build + typecheck gate. If this fails, the deploy below is skipped, so a
  #    broken commit never reaches production. ──────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm run install:all
      - name: Typecheck server
        run: npm --prefix server run typecheck
      - name: Build client + server
        run: npm run build

  # ── CD: deploy to the production server over SSH (pull → install → build → pm2 restart). ──
  deploy:
    needs: ci                      # only deploys if CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}   # optional; defaults to 22 when unset
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}"
            echo "→ Pulling latest main"
            git fetch origin main
            git reset --hard origin/main
            echo "→ Installing dependencies"
            npm --prefix client install --no-audit --no-fund
            npm --prefix server install --no-audit --no-fund
            echo "→ Building (client static export + server dist)"
            npm run build
            echo "→ Restarting the app (pm2)"
            pm2 restart wellness || pm2 start "npm start" --name wellness --cwd server
            pm2 save
            echo "✓ Deployed $(git rev-parse --short HEAD)"
