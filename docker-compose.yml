# Local / single-host run of the full stack. On AWS these become two ECS/Fargate
# services (or App Runner services) behind an ALB.
services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      PORT: "4000"
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "4000:4000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      # The Next server proxies /db,/auth,/storage,/api to the backend. Next bakes
      # this target at build time, so it's a build arg. "server" is the backend
      # service name on this compose network (reachable at runtime).
      args:
        API_PROXY_TARGET: "${API_PROXY_TARGET:-http://server:4000}"
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
